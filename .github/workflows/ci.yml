name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List installed simulator runtimes
        run: xcrun simctl list runtimes

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project Breath.xcodeproj \
            -scheme Breath \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project Breath.xcodeproj \
            -scheme Breath \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -testLanguage cs \
            -testRegion cs_CZ \
            CODE_SIGNING_ALLOWED=NO \
            test
