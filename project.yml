name: Breath
options:
  bundleIdPrefix: cz.martinkoci
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: cs
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Breath:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Breath
      - path: Shared
    resources:
      - path: Breath/Resources
    info:
      path: Breath/Info.plist
      properties:
        CFBundleDisplayName: Breath
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: Breath používá notifikace pro denní připomínky cvičení.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.martinkoci.breath
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Breath/Breath.entitlements

  BreathTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BreathTests
    dependencies:
      - target: Breath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.martinkoci.breath.tests
        GENERATE_INFOPLIST_FILE: YES

  BreathWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BreathWidget
      - path: Shared
    info:
      path: BreathWidget/Info.plist
      properties:
        CFBundleDisplayName: Breath Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.martinkoci.breath.widget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BreathWidget/BreathWidget.entitlements

schemes:
  Breath:
    build:
      targets:
        Breath: all
        BreathWidget: all
        BreathTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BreathTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
